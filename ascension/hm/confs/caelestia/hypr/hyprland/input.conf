input {
    resolve_binds_by_sym = true
    kb_layout = dh, dh, us, us
    kb_variant = , dh-intl, , intl
    kb_options = caps:escape, fkeys:basic_13-24
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

