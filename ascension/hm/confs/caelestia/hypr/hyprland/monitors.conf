# Internal OLED: SDR by default; HDR only through gs-hdr-internal.
monitor=eDP-1,2880x1800@120,0x0,1.5,bitdepth,10,cm,edid

# External SDR displays.
monitor=HDMI-A-1,2560x1080@60,-2560x0,1,cm,srgb
monitor=desc:Xiaomi Corporation Mi 27 NFGL 3215000046425,preferred,1920x0,1,cm,srgb

workspace=1, monitor:HDMI-A-1, persistent:true
workspace=2, monitor:HDMI-A-1, persistent:true
workspace=3, monitor:HDMI-A-1, persistent:true
workspace=4, monitor:HDMI-A-1, persistent:true
workspace=5, monitor:eDP-1, persistent:true
workspace=6, monitor:eDP-1, persistent:true
workspace=7, monitor:eDP-1, persistent:true
workspace=8, monitor:eDP-1, persistent:true
# Fallback for projectors and unknown displays.
monitor = , preferred, auto, 1, mirror, eDP-1

render {
  cm_fs_passthrough = 2
  cm_auto_hdr = 0
}
